name: Refresh vendor_prefixed

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [dep-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh vendor_prefixed
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # Runtime support starts at PHP 8.1, but php-scoper requires PHP 8.2.
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Update bundled dependencies
        run: composer update --no-progress --no-interaction

      - name: Rebuild vendor_prefixed
        run: composer build

      - name: Open refresh pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'build: refresh vendor_prefixed from upstream deps'
          title: 'build: refresh vendor_prefixed from upstream deps'
          branch: auto-refresh-vendor-prefixed
          delete-branch: true
          add-paths: |
            composer.lock
            vendor_prefixed/
          body: |
            Automated dependency refresh. The `composer update` + `composer build`
            output diverged from `main`'s committed `vendor_prefixed/` tree.

            **Review checklist:**
            - [ ] CI is green; conversion tests pass against the rebuilt tree.
            - [ ] Diff in `vendor_prefixed/` looks reasonable.
            - [ ] Known upstream fixes or breaking changes are linked here.

            Triggered by: `${{ github.event_name }}`
